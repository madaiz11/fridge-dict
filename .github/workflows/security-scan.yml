name: Security Scan (SAST)

on:
  pull_request:
    branches: [main, dev]

jobs:
  semgrep:
    name: Semgrep Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep OSS
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/ci
            p/security-audit
            p/secrets
            p/typescript
            p/javascript
            p/golang
            p/react
            p/nodejs
          generateSarif: "1"