name: AI Code Review

# รันเฉพาะเมื่อติด label "ai-review" ใน PR (ประหยัดโควตา Pro ไม่รันทุก push)
# ถ้าโควตา gemini-1.5-pro เต็ม: เปลี่ยน gemini_model ด้านล่างเป็น gemini-1.5-flash
on:
  pull_request:
    types: [labeled]
    branches: [main, dev]

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: github.event.label.name == 'ai-review'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base and create PR diff
        run: |
          git fetch origin ${{ github.event.pull_request.base.sha }}
          git diff ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} > pr.diff
          echo "Diff lines: $(wc -l < pr.diff)"

      - name: Run Gemini pull request review
        id: gemini_review
        uses: google-github-actions/run-gemini-cli@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ github.event.pull_request.title }}
          ISSUE_BODY: ${{ github.event.pull_request.body }}
          PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_model: gemini-1.5-pro
          prompt: |
            บทบาท: คุณคือ Senior Software Engineer และ Security Auditor ที่มีความเชี่ยวชาญสูงและทำงานเนี๊ยบที่สุด
            เป้าหมาย: รีวิว Code Diff ต่อไปนี้อย่างตรงไปตรงมา ห้ามเกรงใจ ห้ามอวย และเน้นจุดที่อาจพังในอนาคต

            ข้อกำหนดในการรีวิว:
            1. Logic & Bugs: ตรวจสอบตรรกะที่ผิดพลาด, Edge cases ที่ลืมคิด (เช่น null, empty, error handling)
            2. Security: ตรวจหาช่องโหว่ เช่น SQL Injection, XSS, Hardcoded Secrets หรือการจัดการสิทธิ์ที่ไม่ปลอดภัย
            3. Performance: จุดไหนที่เขียนแล้วช้า (เช่น N+1 query, loop ซ้อน loop ที่ไม่จำเป็น) หรือกิน Memory เกินไป
            4. Clean Code: การตั้งชื่อตัวแปรที่งี่เง่า, ฟังก์ชันที่ยาวเกินไป, หรือการเขียนโค้ดที่ซ้ำซ้อน (DRY)
            5. Best Practices: ตรวจสอบว่าตรงตามมาตรฐานของภาษา TypeScript/Node.js และ monorepo (pnpm) หรือไม่

            รูปแบบการตอบกลับ:
            - ถ้าโค้ดส่วนไหนดีอยู่แล้ว "ไม่ต้องพูดถึง" ให้ข้ามไปเลย
            - ถ้าพบปัญหา ให้ระบุ "บรรทัดที่" หรือ "ชื่อฟังก์ชัน" พร้อม "เหตุผลที่มันไม่ดี" และ "ตัวอย่างโค้ดที่ควรจะเป็น"
            - ใช้ภาษาไทยที่กระชับ ตรงประเด็น ไม่ต้องมีคำเกริ่นนำ

            Code Diff ที่ต้องรีวิว: ให้รันคำสั่ง cat pr.diff เพื่อดู diff แล้วรีวิวตามข้อกำหนดด้านบน จากนั้นใช้ GitHub MCP (pull_request_review_write) โพสต์ผลรีวิวลง PR
          settings: |
            {
              "model": { "maxSessionTurns": 25 },
              "telemetry": { "enabled": true, "target": "local", "outfile": ".gemini/telemetry.log" },
              "mcpServers": {
                "github": {
                  "command": "docker",
                  "args": ["run", "-i", "--rm", "-e", "GITHUB_PERSONAL_ACCESS_TOKEN", "ghcr.io/github/github-mcp-server:v0.27.0"],
                  "includeTools": ["add_comment_to_pending_review", "pull_request_read", "pull_request_review_write"],
                  "env": { "GITHUB_PERSONAL_ACCESS_TOKEN": "${GITHUB_TOKEN}" }
                }
              },
              "tools": {
                "core": [
                  "run_shell_command(cat)",
                  "run_shell_command(grep)",
                  "run_shell_command(head)",
                  "run_shell_command(tail)"
                ]
              }
            }