name: AI Code Review

on:
  pull_request:
    types: [labeled]
    branches: [main, dev]

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: github.event.label.name == 'ai-review'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base and create PR diff
        env:
          IGNORE_PATTERNS: node_modules/**/*,dist/**/*,.turbo/**/*,*.md,pnpm-lock.yaml,**/package-lock.json
          INCLUDE_PATTERNS: '*.ts,*.tsx,*.js,*.jsx,*.mjs,*.cjs,*.json,*.yml,*.yaml'
        run: |
          git fetch origin ${{ github.event.pull_request.base.sha }}
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          FILTERED=()
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              node_modules/*|*/node_modules/*|dist/*|*/dist/*|.turbo/*|*/.turbo/*) continue ;;
              *.md) continue ;;
              pnpm-lock.yaml|*/pnpm-lock.yaml) continue ;;
              */package-lock.json) continue ;;
            esac
            case "$f" in
              *.ts|*.tsx|*.js|*.jsx|*.mjs|*.cjs|*.json|*.yml|*.yaml) FILTERED+=("$f") ;;
            esac
          done <<< "$CHANGED"
          
          if [ ${#FILTERED[@]} -eq 0 ]; then
            echo "No matching files to review."
            echo "" > pr.diff
          else
            git diff "$BASE_SHA" "$HEAD_SHA" -- "${FILTERED[@]}" > pr.diff
          fi
          echo "Diff lines: $(wc -l < pr.diff)"

      - name: Call OpenRouter API & Post Comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          # ถ้าไม่มี diff ให้ข้ามไปเลย
          if [ ! -s pr.diff ] || [ "$(cat pr.diff | wc -l)" -eq 0 ]; then
            echo "ไม่มีไฟล์ที่ตรงเงื่อนไขให้รีวิว"
            exit 0
          fi

          # 1. เตรียม Prompt
          PROMPT="บทบาท: คุณคือ Senior Software Engineer และ Security Auditor ที่มีความเชี่ยวชาญสูงและทำงานเนี๊ยบที่สุด
          เป้าหมาย: รีวิว Code Diff ต่อไปนี้อย่างตรงไปตรงมา และเน้นจุดที่อาจพังในอนาคต
          
          ข้อกำหนดในการรีวิว:
          1. Logic & Bugs: ตรวจสอบตรรกะที่ผิดพลาด, Edge cases ที่ลืมคิด (เช่น null, empty, error handling)
          2. Security: ตรวจหาช่องโหว่ เช่น SQL Injection, XSS, Hardcoded Secrets
          3. Performance: จุดไหนที่เขียนแล้วช้า (เช่น N+1 query, loop ซ้อน loop ที่ไม่จำเป็น)
          4. Clean Code: การตั้งชื่อตัวแปรที่งี่เง่า, ฟังก์ชันที่ยาวเกินไป, หรือโค้ดซ้ำซ้อน
          5. Best Practices: ตรวจสอบมาตรฐาน TypeScript/Node.js และ monorepo (pnpm)
          
          รูปแบบการตอบกลับ:
          - ถ้าโค้ดดีอยู่แล้ว ข้ามไปเลยไม่ต้องพูดถึง
          - ระบุ 'ชื่อไฟล์' และ 'บรรทัด' พร้อมเหตุผลที่มันไม่ดีและตัวอย่างโค้ดที่ควรจะเป็น
          - ตอบเป็นภาษาไทยที่กระชับ ตรงประเด็น ไม่ต้องเกริ่นนำ"

          # 2. สร้าง JSON Payload อย่างปลอดภัยด้วย jq (ป้องกันเรื่อง Quote พัง)
          jq -n --arg prompt "$PROMPT" --arg diff "$(cat pr.diff)" '{
            "model": "meta-llama/llama-3.1-8b-instruct:free",
            "messages": [
              {"role": "system", "content": $prompt},
              {"role": "user", "content": $diff}
            ]
          }' > payload.json

          # 3. ยิง API ไปที่ OpenRouter
          echo "กำลังส่งข้อมูลไป OpenRouter..."
          RESPONSE=$(curl -s -X POST "https://openrouter.ai/api/v1/chat/completions" \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "Content-Type: application/json" \
            -H "HTTP-Referer: https://github.com/${{ github.repository }}" \
            -H "X-Title: GitHub Actions Reviewer" \
            -d @payload.json)

          # 4. ดึงเฉพาะข้อความตอบกลับออกมาด้วย jq
          REVIEW_RESULT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')
          
          # เช็คว่า Error ไหม (เช่น Token หมด หรือ API ล่ม)
          if [ "$REVIEW_RESULT" == "null" ] || [ -z "$REVIEW_RESULT" ]; then
            echo "Error จาก OpenRouter: $RESPONSE"
            REVIEW_RESULT="เกิดข้อผิดพลาดในการเรียกใช้ OpenRouter API กรุณาเช็ค Action Logs"
          fi

          # 5. โพสต์ผลลัพธ์ลงใน Pull Request ด้วย GitHub CLI
          echo "$REVIEW_RESULT" > review_comment.md
          gh pr comment ${{ github.event.pull_request.number }} --body-file review_comment.md